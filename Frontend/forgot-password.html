<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | ClayCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-box">
            <a href="index.html" class="auth-logo" style="display:flex; align-items:center; justify-content:center; gap:12px; text-decoration:none; margin-bottom:24px; white-space:nowrap;">
                <img src="Images/pottery_hands_logo.png" alt="ClayCraft Logo" style="height:45px; width:45px; border-radius:8px; object-fit:cover; flex-shrink:0;">
                <span style="font-family:'Caveat', cursive; font-size:36px; font-weight:700; background: linear-gradient(45deg, #e63946, #d68c45, #3a5a40); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display:inline-block;">ClayCraft</span>
            </a>
            <h2>Forgot Password</h2>
            <p class="subtitle">Reset your password using email OTP.</p>
            <form onsubmit="handleForgotPassword(event)">
                <div class="auth-form-group">
                    <input type="email" id="resetEmail" placeholder="Email Address" required />
                </div>
                
                <div class="auth-form-group" id="resetOtpGroup" style="display: none;">
                    <input type="text" id="resetOtp" placeholder="Enter 6-digit OTP" />
                    <div style="text-align: right; margin-top: 5px;">
                        <button type="button" id="resendOtpBtn" onclick="resendOtp(event)" style="background:none; border:none; color:#d68c45; cursor:pointer; font-size:0.9rem;">Resend OTP</button>
                    </div>
                </div>
                <div class="auth-form-group" id="newPasswordGroup" style="display: none;">
                    <input type="password" id="newPassword" placeholder="New Password" />
                </div>
                <button type="submit" class="btn-primary" id="resetBtn">Send OTP</button>
            </form>
            <p class="switch-text"><a href="index.html">Back to Home</a></p>
        </div>
    </div>
    
    <script>
        let resetOtpSent = false;
        async function resendOtp(event) {
            event.preventDefault();
            const email = document.getElementById("resetEmail").value;
            const resendBtn = document.getElementById("resendOtpBtn");
            if (!email) return alert("Please enter email first");
            
            resendBtn.disabled = true;
            resendBtn.style.color = "grey";
            let cooldown = 30;
            resendBtn.textContent = `Resend in ${cooldown}s`;
            
            const timer = setInterval(() => {
                cooldown--;
                resendBtn.textContent = `Resend in ${cooldown}s`;
                if (cooldown <= 0) {
                    clearInterval(timer);
                    resendBtn.disabled = false;
                    resendBtn.style.color = "#d68c45";
                    resendBtn.textContent = "Resend OTP";
                }
            }, 1000);

            try {
                const response = await fetch("http://localhost:5000/api/forgot-password-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                alert(data.message);
            } catch (error) {
                alert("Error sending OTP");
            }
        }

        async function handleForgotPassword(event) {
            event.preventDefault();
            const email = document.getElementById("resetEmail").value;
            
            if (!resetOtpSent) {
                try {
                    const response = await fetch("http://localhost:5000/api/forgot-password-otp", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email })
                    });
                    const data = await response.json();
                    if (data.message === "OTP sent successfully") {
                        resetOtpSent = true;
                        document.getElementById("resetOtpGroup").style.display = "block";
                        document.getElementById("newPasswordGroup").style.display = "block";
                        document.getElementById("resetBtn").textContent = "Reset Password";
                        document.getElementById("resetEmail").disabled = true;
                        alert("OTP sent to your email. Please check your inbox.");
                    } else {
                        alert(data.message);
                    }
                } catch (error) {
                    alert("Error sending OTP");
                }
                return;
            }
            
            const otp = document.getElementById("resetOtp").value;
            const newPassword = document.getElementById("newPassword").value;
            
            if (!otp || !newPassword) return alert("Please enter OTP and new password");
            
            try {
                const response = await fetch("http://localhost:5000/api/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, otp, newPassword })
                });
                const data = await response.json();
                if (data.message === "Password reset successful") {
                    alert("Password reset successfully! You can now log in.");
                    window.location.href = "customer-login.html"; // Default redirect
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert("Error resetting password");
            }
        }
    </script>
</body>
</html>
