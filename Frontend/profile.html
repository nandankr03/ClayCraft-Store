<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - ClayCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-container {
      max-width: 800px;
      margin: 60px auto;
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .profile-header {
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 20px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .profile-header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      color: #1a1a1a;
    }
    .profile-form-group {
      margin-bottom: 20px;
    }
    .profile-form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }
    .profile-form-group input, .profile-form-group textarea {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      transition: all 0.3s;
    }
    .profile-form-group input:focus, .profile-form-group textarea:focus {
      border-color: #e63946;
      outline: none;
      box-shadow: 0 0 0 3px rgba(230,57,70,0.1);
    }
    .profile-form-group input:read-only, .profile-form-group textarea:read-only {
      background-color: #f9f9f9;
      color: #666;
      border-color: #eee;
    }
    .profile-actions {
      margin-top: 30px;
      display: flex;
      gap: 15px;
    }
    .btn-edit, .btn-save {
      padding: 12px 30px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
      border: none;
    }
    .btn-edit {
      background: #f0f0f0;
      color: #333;
    }
    .btn-edit:hover {
      background: #e4e4e4;
    }
    .btn-save {
      background: #e63946;
      color: #fff;
      display: none;
    }
    .btn-save:hover {
      background: #d62828;
    }
  </style>
</head>
<body>
  <!-- Nav will be updated by the script, but I'll provide the unified one directly -->
        <nav id="mainNav">
    <div class="logo" onclick="window.location='index.html'" style="cursor:pointer;">
      <img src="Images/pottery_hands_logo.png" alt="Claycraft Logo" style="height:40px; width:40px; border-radius:6px; object-fit:cover;">
      <span style="background: linear-gradient(45deg, #e63946, #d68c45, #3a5a40); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;">ClayCraft</span>
    </div>

    <!-- Desktop search bar -->
    <div class="search-bar">
      <div class="search-wrapper" style="max-width: 500px; position: relative;">
        <input type="text" id="searchInput" placeholder="Search for products">
        <span id="clearSearchBtn" onclick="document.getElementById('searchInput').value=''; this.style.display='none'; document.getElementById('searchInput').focus();" style="display:none; position:absolute; right: 55px; top: 50%; transform: translateY(-50%); cursor:pointer; font-size: 14px; color:#999; padding:5px;">&#10006;</span>
        <button id="searchBtn" onclick="triggerSearch(document.getElementById('searchInput').value)" style="font-size:18px; display:flex; align-items:center; justify-content:center;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
      </div>
    </div>

    <ul id="navLinks" class="nav-main-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      
      <!-- Logged Out Links -->
      <li class="dropdown logged-out-only">
        <a href="#" class="dropdown-toggle">Login &#9662;</a>
        <div class="dropdown-menu">
          <a href="customer-login.html">Customer Login</a>
          <a href="artisan-login.html">Artisan Login</a>
          <a href="admin-login.html" id="adminLoginLink">Admin Login</a>
        </div>
      </li>
      <li class="dropdown logged-out-only">
        <a href="#" class="dropdown-toggle">Register &#9662;</a>
        <div class="dropdown-menu">
          <a href="customer-signup.html">Customer</a>
          <a href="artisan-signup.html">Artisan</a>
        </div>
      </li>
      
      <!-- Logged In Links -->
      <li class="dropdown logged-in-only" style="display:none;">
        <a href="#" id="userNameDisplay" class="dropdown-toggle">Hi, User &#9662;</a>
        <div class="dropdown-menu">
          <a href="profile.html">My Profile</a>
          <a href="myOrder.html">My Orders</a>
          <a href="wishlist.html" class="cart-link">Wishlist <span id="wishlist-count-dropdown" class="badge">0</span></a>
          <a href="cart.html" class="cart-link">Cart 🛒 <span id="cart-count-dropdown" class="badge">0</span></a>
          <a href="#" onclick="logoutUser(event)">Logout</a>
        </div>
      </li>
    </ul>

    <!-- Right-side icons: search toggle + hamburger -->
    <div style="display:flex; align-items:center; gap:6px;">
      <!-- Mobile search icon -->
      <button class="search-toggle-btn" id="searchToggleBtn" aria-label="Toggle search">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m0 0A7 7 0 1 0 4.65 4.65a7 7 0 0 0 12 12z"/>
        </svg>
      </button>

      <!-- Hamburger -->
      <button class="hamburger" id="hamburgerBtn" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <div class="profile-container">
    <div class="profile-header">
      <h1>My Profile</h1>
    </div>
    
    <form id="profileForm">
      <div class="profile-form-group">
        <label for="profName">Name</label>
        <input type="text" id="profName" readonly>
      </div>
      <div class="profile-form-group">
        <label for="profEmail">Email</label>
        <input type="email" id="profEmail" readonly disabled style="cursor:not-allowed;">
        <small style="color:#888;">Email cannot be changed.</small>
      </div>
      <div class="profile-form-group">
        <label for="profPhone">Phone Number</label>
        <input type="tel" id="profPhone" readonly>
      </div>
      <div class="profile-form-group">
        <label for="profAddress">Address</label>
        <textarea id="profAddress" rows="3" readonly></textarea>
      </div>
      
      <div class="profile-actions">
        <button type="button" class="btn-edit" id="editBtn" onclick="toggleEdit()">Edit Profile</button>
        <button type="button" class="btn-save" id="saveBtn" onclick="saveProfile()">Save Changes</button>
      </div>
    </form>
  </div>

  <footer class="main-footer" style="margin-top:0;">
    <div class="footer-bottom" style="margin-top:0; border:none; padding-bottom:30px;">
      <p>© 2025 ClayCraft | Designed with ❤️</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (!localStorage.getItem("loggedInUser")) {
        window.location.href = "customer-login.html";
        return;
      }
      
      loadProfileData();
    });

    function loadProfileData() {
      const email = localStorage.getItem("loggedInUser");
      document.getElementById("profEmail").value = email;
      
      const profile = JSON.parse(localStorage.getItem("userProfile_" + email) || "{}");
      
      // If we don't have a profile yet, populate name from email as fallback
      document.getElementById("profName").value = profile.name || email.split('@')[0];
      document.getElementById("profPhone").value = profile.phone || "";
      document.getElementById("profAddress").value = profile.address || "";
    }

    function toggleEdit() {
      const inputs = ["profName", "profPhone", "profAddress"];
      inputs.forEach(id => {
        document.getElementById(id).readOnly = false;
      });
      document.getElementById("editBtn").style.display = "none";
      document.getElementById("saveBtn").style.display = "block";
      document.getElementById("profName").focus();
    }

    function saveProfile() {
      const email = localStorage.getItem("loggedInUser");
      const profile = {
        name: document.getElementById("profName").value,
        phone: document.getElementById("profPhone").value,
        address: document.getElementById("profAddress").value
      };
      
      localStorage.setItem("userProfile_" + email, JSON.stringify(profile));
      
      const inputs = ["profName", "profPhone", "profAddress"];
      inputs.forEach(id => {
        document.getElementById(id).readOnly = true;
      });
      
      document.getElementById("editBtn").style.display = "block";
      document.getElementById("saveBtn").style.display = "none";
      
      alert("Profile updated successfully!");
      
      // Update display name in navbar if needed
      const userNameDisplay = document.getElementById("userNameDisplay");
      if (userNameDisplay) {
          userNameDisplay.innerHTML = `Hi, ${profile.name} &#9662;`;
      }
    }
  </script>
</body>
</html>
