<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | ClayCraft</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-body { background: linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:"Inter",sans-serif; }
    .auth-container { width:100%; padding:20px; display:flex; align-items:center; justify-content:center; }
    .auth-box {
      background: rgba(255,255,255,0.97);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    }
    .auth-brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-brand .brand-name {
      font-family: "Poppins", sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #1a1a1a;
    }
    .auth-brand .brand-name span { color: #e63946; }
    .admin-badge-header {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(230,57,70,0.1); color: #e63946;
      padding: 6px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 700; margin-top: 10px;
    }
    .title { font-family:"Poppins",sans-serif; font-size:26px; font-weight:800; color:#1a1a1a; margin-bottom:6px; text-align:center; }
    .subtitle { color:#888; font-size:14px; text-align:center; margin-bottom:28px; }
    .auth-form-group { margin-bottom:16px; }
    .auth-form-group input {
      width:100%; padding:14px 18px; border:1.5px solid #e0e0e0; border-radius:12px;
      font-size:15px; font-family:"Inter",sans-serif; outline:none; color:#333;
      transition: border-color 0.3s, box-shadow 0.3s; background:#fafafa;
    }
    .auth-form-group input:focus { border-color:#e63946; box-shadow:0 0 0 4px rgba(230,57,70,0.1); background:#fff; }
    .btn-primary {
      width:100%; padding:15px; background:#e63946; color:#fff; border:none;
      border-radius:12px; font-size:16px; font-weight:700; cursor:pointer;
      font-family:"Inter",sans-serif; transition:all 0.3s; margin-top:8px;
      box-shadow: 0 4px 15px rgba(230,57,70,0.35);
    }
    .btn-primary:hover { background:#c92a37; transform:translateY(-2px); box-shadow:0 8px 25px rgba(230,57,70,0.45); }
    .switch-text { text-align:center; margin-top:20px; font-size:14px; color:#666; }
    .switch-text a { color:#e63946; font-weight:600; text-decoration:none; }
    .switch-text a:hover { text-decoration:underline; }
    .back-link { text-align:center; margin-top:14px; }
    .back-link a { font-size:13px; color:#aaa; text-decoration:none; }
    .back-link a:hover { color:#e63946; }
    @media(max-width:480px){.auth-box{padding:36px 24px;}}
  </style>
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-brand">
        <a href="index.html" class="auth-logo" style="display:flex; align-items:center; justify-content:center; gap:12px; text-decoration:none; margin-bottom:24px; white-space:nowrap;">
  <img src="Images/pottery_hands_logo.png" alt="ClayCraft Logo" style="height:45px; width:45px; border-radius:8px; object-fit:cover; flex-shrink:0;">
  <span style="font-family:'Caveat', cursive; font-size:36px; font-weight:700; background: linear-gradient(45deg, #e63946, #d68c45, #3a5a40); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display:inline-block;">ClayCraft</span>
</a>
        <div class="admin-badge-header">🛡️ Admin Portal</div>
      </div>
      <h2 class="title">Admin Login</h2>
      <p class="subtitle">Sign in to manage products and artisan requests</p>
      <form onsubmit="handleAuth(event, 'login', 'admin')">
        <div class="auth-form-group">
          <input type="email" id="email" placeholder="Admin Email Address" required />
        </div>
        <div class="auth-form-group">
          <input type="password" id="password" placeholder="Password" required />
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: -10px; margin-bottom: 20px;">
          <div style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="showPassword" onclick="togglePasswordVisibility('password')" style="width: auto; cursor: pointer;">
            <label for="showPassword" style="font-size: 0.9rem; color: #555; cursor: pointer;">Show Password</label>
          </div>
          <a href="forgot-password.html" style="font-size: 0.9rem; color: #e63946; text-decoration: none;">Forgot Password?</a>
        </div>
        <button type="submit" class="btn-primary">🔐 Login to Dashboard</button>
      </form>
      <p class="switch-text">New admin? <a href="admin-signup.html">Register here</a></p>
      <div class="back-link"><a href="index.html">← Back to Store</a></div>
    </div>
  </div>
  <script src="authLogic.js"></script>
</body>
</html>
