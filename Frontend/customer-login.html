<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Customer login — ClayCraft.">
    <title>Customer Login | ClayCraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-box">
            <a href="index.html" class="auth-logo" style="display:flex; align-items:center; justify-content:center; gap:12px; text-decoration:none; margin-bottom:24px; white-space:nowrap;">
  <img src="Images/pottery_hands_logo.png" alt="ClayCraft Logo" style="height:45px; width:45px; border-radius:8px; object-fit:cover; flex-shrink:0;">
  <span style="font-family:'Caveat', cursive; font-size:36px; font-weight:700; background: linear-gradient(45deg, #e63946, #d68c45, #3a5a40); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display:inline-block;">ClayCraft</span>
</a>
            <h2>Customer Login</h2>
            <p class="subtitle">Welcome back! Sign in to your account.</p>
            <form onsubmit="handleAuth(event, 'login', 'customer')">
                <div class="auth-form-group">
                    <input type="email" id="email" placeholder="Email Address" required autocomplete="email" />
                </div>
                <div class="auth-form-group">
                    <input type="password" id="password" placeholder="Password" required autocomplete="current-password" />
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: -10px; margin-bottom: 20px;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="showPassword" onclick="togglePasswordVisibility('password')" style="width: auto; cursor: pointer;">
                        <label for="showPassword" style="font-size: 0.9rem; color: #555; cursor: pointer;">Show Password</label>
                    </div>
                    <a href="forgot-password.html" style="font-size: 0.9rem; color: #e63946; text-decoration: none;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <p class="switch-text">Don't have an account? <a href="customer-signup.html">Sign Up</a></p>
        </div>
    </div>
    <script src="authLogic.js"></script>
</body>

</html>
